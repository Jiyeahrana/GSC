<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>WEB NAME | Shipment Calendar</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
    tailwind.config = {
        darkMode: "class",
        theme: {
            extend: {
                "colors": {
                    "background": "#001523","surface": "#001523",
                    "surface-container-lowest": "#00101c","surface-container-low": "#071d2c",
                    "surface-container": "#0c2230","surface-container-high": "#172c3b",
                    "surface-container-highest": "#233746","surface-bright": "#273b4b",
                    "surface-dim": "#001523","surface-variant": "#233746",
                    "on-surface": "#d0e5f9","on-surface-variant": "#c4c6cc",
                    "primary": "#d6e4f9","primary-container": "#bac8dc",
                    "on-primary": "#243141","on-primary-container": "#465465",
                    "secondary": "#a4cce8","secondary-container": "#214b62",
                    "on-secondary": "#02344b","on-secondary-container": "#93bad6",
                    "tertiary": "#fb6b00","tertiary-container": "#ffb693",
                    "on-tertiary": "#562000","on-tertiary-container": "#8d3900",
                    "error": "#ffb4ab","error-container": "#93000a",
                    "on-error": "#690005","on-error-container": "#ffdad6",
                    "outline": "#8e9196","outline-variant": "#44474c",
                    "inverse-surface": "#d0e5f9","inverse-on-surface": "#1e3342",
                    "inverse-primary": "#525f71"
                },
                "borderRadius": {"DEFAULT":"0.125rem","lg":"0.25rem","xl":"0.5rem","full":"0.75rem"},
                "fontFamily": {"headline":["Manrope"],"body":["Inter"],"label":["Inter"]}
            }
        }
    }
</script>
<style>
    .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        display: inline-block; vertical-align: middle;
    }
    .calendar-grid {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        grid-auto-rows: minmax(90px, 1fr);
    }
    .week-grid {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        grid-auto-rows: minmax(120px, 1fr);
    }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #001523; }
    ::-webkit-scrollbar-thumb { background: #172c3b; border-radius: 10px; }
</style>
</head>
<body class="bg-background text-on-surface font-body">

<!-- Sidebar -->
<aside class="flex flex-col h-screen fixed left-0 top-0 py-8 bg-[#00111C] w-64 z-50">
    <div class="px-6 mb-10">
        <h1 id="sidebar-port-name" class="text-[#d8e4ec] font-headline font-extrabold text-xl tracking-tight">Port name</h1>
        <p class="text-on-surface-variant text-xs mt-1">Real-Time Port Operations & Monitoring</p>
    </div>
    <nav class="flex-1 flex flex-col gap-2">
        <a class="flex items-center gap-3 px-6 py-3 text-[#c6c5d4] opacity-80 hover:bg-[#202b32] hover:text-[#d8e4ec] transition-all" href="Dashboardport.html">
            <span class="material-symbols-outlined">dashboard</span>Dashboard
        </a>
        <a class="flex items-center gap-3 px-6 py-3 text-[#c6c5d4] opacity-80 hover:bg-[#202b32] hover:text-[#d8e4ec] transition-all" href="detailed_storage.html">
            <span class="material-symbols-outlined">inventory</span>Storage
        </a>
        <a class="flex items-center gap-3 px-6 py-3 text-[#c6c5d4] opacity-80 hover:bg-[#202b32] hover:text-[#d8e4ec] transition-all" href="detailed_shipment.html">
            <span class="material-symbols-outlined">directions_boat</span>Shipments
        </a>
        <a class="bg-[#202b32] text-[#fb6b00] border-l-4 border-[#fb6b00] flex items-center gap-3 px-4 py-3 mx-2 rounded-sm transition-all">
            <span class="material-symbols-outlined">timeline</span>Shipment Timeline
        </a>
    </nav>
    <div class="mt-auto border-t border-outline-variant/10 pt-6">
        <a id="logout-btn" class="flex items-center gap-3 px-6 py-3 text-[#c6c5d4] opacity-80 hover:bg-[#202b32] hover:text-[#d8e4ec] transition-all cursor-pointer">
            <span class="material-symbols-outlined">logout</span>Logout
        </a>
    </div>
</aside>

<!-- Main -->
<main class="ml-64 min-h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-[#000d16]/80 backdrop-blur-xl sticky top-0 z-40 border-b border-white/5 flex justify-between items-center px-6 h-16">
        <div class="flex items-center gap-4">
            <!-- Prev -->
            <button id="btn-prev" class="material-symbols-outlined text-on-surface-variant hover:text-primary transition-colors p-1">chevron_left</button>
            <!-- Label -->
            <span id="calendar-label" class="text-primary font-bold font-headline tracking-tight text-sm min-w-[160px] text-center">—</span>
            <!-- Next -->
            <button id="btn-next" class="material-symbols-outlined text-on-surface-variant hover:text-primary transition-colors p-1">chevron_right</button>
            <!-- Today -->
            <button id="btn-today" class="px-3 py-1 text-[10px] font-bold uppercase tracking-widest border border-outline-variant/40 rounded text-on-surface-variant hover:text-primary hover:border-primary transition-colors ml-2">Today</button>
        </div>
        <div class="flex items-center gap-6">
            <!-- View Toggles -->
            <div class="flex bg-surface-container-lowest p-1 rounded-lg gap-1">
                <button id="view-day"   class="view-btn px-3 py-1 text-[10px] font-bold uppercase tracking-widest rounded transition-colors">Day</button>
                <button id="view-week"  class="view-btn px-3 py-1 text-[10px] font-bold uppercase tracking-widest rounded transition-colors">Week</button>
                <button id="view-month" class="view-btn px-3 py-1 text-[10px] font-bold uppercase tracking-widest rounded transition-colors">Month</button>
            </div>
        </div>
    </header>

    <!-- Calendar Canvas -->
    <div class="flex-1 p-6 overflow-y-auto">

        <!-- Day headers (only for month/week) -->
        <div id="day-headers" class="grid grid-cols-7 mb-2">
            <div class="text-center py-2 text-[10px] font-black uppercase tracking-[0.2em] text-on-surface-variant/60 font-headline">Mon</div>
            <div class="text-center py-2 text-[10px] font-black uppercase tracking-[0.2em] text-on-surface-variant/60 font-headline">Tue</div>
            <div class="text-center py-2 text-[10px] font-black uppercase tracking-[0.2em] text-on-surface-variant/60 font-headline">Wed</div>
            <div class="text-center py-2 text-[10px] font-black uppercase tracking-[0.2em] text-on-surface-variant/60 font-headline">Thu</div>
            <div class="text-center py-2 text-[10px] font-black uppercase tracking-[0.2em] text-on-surface-variant/60 font-headline">Fri</div>
            <div class="text-center py-2 text-[10px] font-black uppercase tracking-[0.2em] text-on-surface-variant/60 font-headline">Sat</div>
            <div class="text-center py-2 text-[10px] font-black uppercase tracking-[0.2em] text-on-surface-variant/60 font-headline">Sun</div>
        </div>

        <!-- Calendar grid — JS renders here -->
        <div id="calendar-container" class="bg-surface-container-lowest rounded-xl overflow-hidden border border-white/5 shadow-inner"></div>

        <!-- Legend -->
        <div class="mt-6 flex items-center justify-center gap-8 py-4 bg-surface-container-low/50 rounded-xl border border-white/5">
            <div class="flex items-center gap-2">
                <div class="w-2 h-2 rounded-full bg-[#639922]"></div>
                <span class="text-[10px] font-black uppercase tracking-widest text-on-surface-variant font-headline">Inbound</span>
            </div>
            <div class="flex items-center gap-2">
                <div class="w-2 h-2 rounded-full bg-[#E24B4A]"></div>
                <span class="text-[10px] font-black uppercase tracking-widest text-on-surface-variant font-headline">Outbound</span>
            </div>
            <div class="flex items-center gap-2">
                <div class="w-2 h-2 rounded-full bg-[#5DCAA5]"></div>
                <span class="text-[10px] font-black uppercase tracking-widest text-on-surface-variant font-headline">Docked</span>
            </div>
            <div class="flex items-center gap-2">
                <div class="w-2 h-2 rounded-full bg-[#ffb692]"></div>
                <span class="text-[10px] font-black uppercase tracking-widest text-on-surface-variant font-headline">Delayed</span>
            </div>
        </div>
    </div>

</main>

<!-- Global popup (shared, positioned by JS) -->
<div id="global-popup" class="fixed hidden z-[999] w-64 bg-surface-container-highest border border-white/10 rounded-xl shadow-2xl p-4">
    <div class="flex justify-between items-center mb-3">
        <h4 id="popup-date-label" class="text-[10px] font-bold uppercase text-tertiary">—</h4>
        <span id="popup-close" class="cursor-pointer text-on-surface-variant hover:text-primary text-sm">✕</span>
    </div>
    <ul id="popup-list" class="flex flex-col gap-2 text-xs max-h-48 overflow-y-auto"></ul>
</div>

<script src="shipment_timeline.js"></script>
</body>
</html>
