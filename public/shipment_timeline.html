<style>

<script>
(function() {

  // ── CONFIG — change these two lines per page ────────────────────────────────
  const CHAT_MODE = "admin";   // "public" or "admin"
  const API_BASE  = "http://localhost:3000/api/v1/chat";
  // ───────────────────────────────────────────────────────────────────────────

  const PUBLIC_SUGGESTIONS = [
    "How do I track my shipment?",
    "Show me upcoming shipments for Mumbai port",
    "How do I register a new port?"
  ];

  const ADMIN_SUGGESTIONS = [
    "How many shipments do we have today?",
    "Show me all delayed shipments",
    "What is our current zone capacity?"
  ];

  const isAdmin     = CHAT_MODE === "admin";
  const endpoint    = `${API_BASE}/${CHAT_MODE}`;
  const token       = localStorage.getItem("token");
  const suggestions = isAdmin ? ADMIN_SUGGESTIONS : PUBLIC_SUGGESTIONS;

  let history  = [];
  let isTyping = false;

  const fab        = document.getElementById("poms-fab");
  const panel      = document.getElementById("poms-panel");
  const messages   = document.getElementById("poms-messages");
  const suggestBox = document.getElementById("poms-suggestions");
  const input      = document.getElementById("poms-input");
  const sendBtn    = document.getElementById("poms-send");

  document.getElementById("poms-bot-name").textContent =
    isAdmin ? "Port Admin AI" : "POMS Assistant";
  document.getElementById("poms-bot-sub").textContent =
    isAdmin ? "Full data access" : "Public assistant";

  fab.addEventListener("click", () => {
    const isOpen = panel.classList.toggle("open");
    fab.classList.toggle("open");
    if (isOpen && messages.children.length === 0) showWelcome();
  });

  document.addEventListener("click", (e) => {
    if (!document.getElementById("poms-chat-widget").contains(e.target)) {
      panel.classList.remove("open");
      fab.classList.remove("open");
    }
  });

  function showWelcome() {
    const msg = isAdmin
      ? "Hello! I have full access to your port data. Ask me about shipments, delays, zone capacity, or anything operational."
      : "Hi! I can help you track shipments, find port schedules, or answer questions about using this platform.";
    appendMessage("bot", msg);
    renderSuggestions();
  }

  function renderSuggestions() {
    suggestBox.innerHTML = "";
    suggestions.forEach(s => {
      const btn = document.createElement("button");
      btn.className   = "poms-suggestion";
      btn.textContent = s;
      btn.addEventListener("click", () => {
        suggestBox.innerHTML = "";
        sendMessage(s);
      });
      suggestBox.appendChild(btn);
    });
  }

  function appendMessage(role, text) {
    const wrap = document.createElement("div");
    wrap.className = `poms-msg ${role}`;
    if (role === "bot") {
      const icon = document.createElement("div");
      icon.className = "poms-bot-icon";
      icon.innerHTML = `<svg viewBox="0 0 24 24"><path d="M12 2a2 2 0 012 2c0 .74-.4 1.39-1 1.73V7h1a7 7 0 017 7H3a7 7 0 017-7h1V5.73A2 2 0 0110 4a2 2 0 012-2z"/></svg>`;
      wrap.appendChild(icon);
    }
    const bubble = document.createElement("div");
    bubble.className = "poms-bubble";
    bubble.textContent = text;
    wrap.appendChild(bubble);
    messages.appendChild(wrap);
    messages.scrollTop = messages.scrollHeight;
  }

  function showTyping() {
    const wrap = document.createElement("div");
    wrap.className = "poms-msg bot";
    wrap.id = "poms-typing-wrap";
    const icon = document.createElement("div");
    icon.className = "poms-bot-icon";
    icon.innerHTML = `<svg viewBox="0 0 24 24"><path d="M12 2a2 2 0 012 2c0 .74-.4 1.39-1 1.73V7h1a7 7 0 017 7H3a7 7 0 017-7h1V5.73A2 2 0 0110 4a2 2 0 012-2z"/></svg>`;
    wrap.appendChild(icon);
    const dots = document.createElement("div");
    dots.className = "poms-typing";
    dots.innerHTML = "<span></span><span></span><span></span>";
    wrap.appendChild(dots);
    messages.appendChild(wrap);
    messages.scrollTop = messages.scrollHeight;
  }

  function removeTyping() {
    const el = document.getElementById("poms-typing-wrap");
    if (el) el.remove();
  }

  async function sendMessage(text) {
    if (!text.trim() || isTyping) return;
    suggestBox.innerHTML = "";
    appendMessage("user", text);
    input.value = "";
    input.style.height = "auto";
    history.push({ role: "user", parts: [{ text }] });
    isTyping = true;
    sendBtn.disabled = true;
    showTyping();
    try {
      const headers = { "Content-Type": "application/json" };
      if (isAdmin && token) headers["Authorization"] = `Bearer ${token}`;

      // Pass live Firebase sensor data if available on this page
      const sensorPayload = (isAdmin && typeof sensorData !== "undefined")
          ? sensorData
          : null;

      const res = await fetch(endpoint, {
          method: "POST", headers,
          body: JSON.stringify({ messages: history, sensor_data: sensorPayload })
      });
      const data = await res.json();
      removeTyping();
      if (data.success) {
        appendMessage("bot", data.reply);
        history.push({ role: "model", parts: [{ text: data.reply }] });
      } else {
        appendMessage("bot", "Sorry, I ran into an issue. Please try again.");
      }
    } catch (err) {
      removeTyping();
      appendMessage("bot", "Connection error. Please check your network and try again.");
    } finally {
      isTyping = false;
      sendBtn.disabled = false;
      input.focus();
    }
  }

  sendBtn.addEventListener("click", () => sendMessage(input.value));
  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(input.value); }
  });
  input.addEventListener("input", () => {
    input.style.height = "auto";
    input.style.height = Math.min(input.scrollHeight, 80) + "px";
  });

})();
</script>
</body>
</html>
